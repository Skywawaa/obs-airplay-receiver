name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v2.0.1)'
        required: true
        default: 'v2.0.1'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install OpenSSL via Chocolatey
        run: choco install openssl -y --no-progress

      - name: Create deps directory
        shell: bash
        run: mkdir -p deps

      - name: Clone UxPlay (mika314/obs-airplay)
        shell: bash
        run: |
          git clone --depth 1 --recurse-submodules \
            https://github.com/mika314/obs-airplay.git deps/mika-obs-airplay

      - name: Download OBS Studio SDK 32.1.2
        shell: bash
        run: |
          curl -L -o deps/obs-sdk.zip \
            "https://github.com/obsproject/obs-studio/archive/refs/tags/32.1.2.zip"
          mkdir -p deps/obs-sdk
          cd deps/obs-sdk
          unzip -q ../obs-sdk.zip

      - name: Create obsconfig.h for OBS SDK
        shell: bash
        run: |
          cat > deps/obs-sdk/obs-studio-32.1.2/libobs/obsconfig.h << 'EOF'
          #pragma once
          #define OBS_DATA_PATH "data"
          #define OBS_PLUGIN_PATH "obs-plugins/64bit"
          #define OBS_PLUGIN_DESTINATION "obs-plugins/64bit"
          #define OBS_RELEASE_CANDIDATE 0
          #define OBS_BETA 0
          EOF

      - name: Download FFmpeg 7.1 headers
        shell: bash
        run: |
          curl -L -o deps/ffmpeg7-headers.zip \
            "https://github.com/FFmpeg/FFmpeg/archive/refs/tags/n7.1.1.zip"
          cd deps
          unzip -q ffmpeg7-headers.zip
          mkdir -p ffmpeg7-include
          for lib in libavcodec libavutil libswscale libswresample libavformat; do
            mkdir -p ffmpeg7-include/$lib
            cp FFmpeg-n7.1.1/$lib/*.h ffmpeg7-include/$lib/
          done
          # Create required generated headers
          cat > ffmpeg7-include/libavutil/avconfig.h << 'AVEOF'
          #ifndef AVUTIL_AVCONFIG_H
          #define AVUTIL_AVCONFIG_H
          #define AV_HAVE_BIGENDIAN 0
          #define AV_HAVE_FAST_UNALIGNED 1
          #endif
          AVEOF
          cat > ffmpeg7-include/libavutil/ffversion.h << 'FFEOF'
          #ifndef AVUTIL_FFVERSION_H
          #define AVUTIL_FFVERSION_H
          #define FFMPEG_VERSION "7.1.1"
          #endif
          FFEOF

      - name: Download libplist 2.7.0
        shell: bash
        run: |
          curl -L -o deps/libplist.zip \
            "https://github.com/libimobiledevice/libplist/archive/refs/tags/2.7.0.zip"
          cd deps && unzip -q libplist.zip

      - name: Create libplist config.h
        shell: bash
        run: |
          cat > deps/libplist-2.7.0/config.h << 'EOF'
          #pragma once
          #define PACKAGE_VERSION "2.7.0"
          #define PACKAGE_NAME "libplist"
          #define PACKAGE_STRING "libplist 2.7.0"
          #define HAVE_STRDUP 1
          #define HAVE_STDINT_H 1
          #define HAVE_STDLIB_H 1
          #define HAVE_STRING_H 1
          #ifdef _MSC_VER
          #define strcasecmp _stricmp
          #define strncasecmp _strnicmp
          #define strdup _strdup
          #ifndef ssize_t
          #include <basetsd.h>
          typedef SSIZE_T ssize_t;
          #endif
          #endif
          EOF

      - name: Create libplist CMakeLists.txt
        shell: bash
        run: |
          cat > deps/libplist-2.7.0/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.16)
          project(libplist C CXX)
          add_library(plist STATIC
              src/base64.c src/bplist.c src/bytearray.c src/hashtable.c
              src/jplist.c src/jsmn.c src/oplist.c src/out-default.c
              src/out-limd.c src/out-plutil.c src/plist.c src/ptrarray.c
              src/time64.c src/xplist.c
              libcnary/cnary.c libcnary/node.c libcnary/node_list.c
          )
          target_include_directories(plist PUBLIC
              ${CMAKE_CURRENT_SOURCE_DIR}/include
              ${CMAKE_CURRENT_SOURCE_DIR}/libcnary/include
              ${CMAKE_CURRENT_SOURCE_DIR}/src
              ${CMAKE_CURRENT_SOURCE_DIR}
          )
          target_compile_definitions(plist PRIVATE HAVE_CONFIG_H=1 _CRT_SECURE_NO_WARNINGS _CRT_NONSTDC_NO_DEPRECATE)
          if(MSVC)
              target_compile_options(plist PRIVATE /wd4244 /wd4267 /wd4996 /wd4018 /wd4047 /wd4024 /wd4789)
          endif()
          EOF

      - name: Build libplist
        shell: cmd
        run: |
          cd deps\libplist-2.7.0
          if exist build rmdir /s /q build
          mkdir build
          cd build
          cmake .. -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl
          nmake

      - name: Create def files
        shell: bash
        run: |
          # Create .def files if not present
          cat > deps/obs.def << 'EOFDEF'
          LIBRARY obs
          EXPORTS
              obs_register_source
              obs_register_source_s
              obs_source_output_video
              obs_source_output_audio
              obs_data_get_string
              obs_data_get_int
              obs_data_get_bool
              obs_data_set_default_string
              obs_data_set_default_int
              obs_data_set_default_bool
              obs_properties_create
              obs_properties_add_text
              obs_properties_add_int
              obs_properties_add_bool
              obs_properties_add_list
              obs_property_list_add_string
              obs_property_list_add_int
              obs_get_locale
              blog
              blogva
              bzalloc
              bmalloc
              bfree
              bmemdup
              bstrdup
              text_lookup_destroy
              text_lookup_getstr
              obs_module_load_locale
              obs_module_get_config_path
          EOFDEF

          cat > deps/w32-pthreads.def << 'EOFDEF'
          LIBRARY w32-pthreads
          EXPORTS
              pthread_create
              pthread_join
              pthread_mutex_init
              pthread_mutex_destroy
              pthread_mutex_lock
              pthread_mutex_unlock
              pthread_cond_init
              pthread_cond_destroy
              pthread_cond_signal
              pthread_cond_broadcast
              pthread_cond_wait
              pthread_cond_timedwait
          EOFDEF

          cat > deps/dnssd.def << 'EOFDEF'
          LIBRARY dnssd
          EXPORTS
              DNSServiceRegister
              DNSServiceRefDeallocate
              TXTRecordCreate
              TXTRecordDeallocate
              TXTRecordSetValue
              TXTRecordGetLength
              TXTRecordGetBytesPtr
          EOFDEF

          mkdir -p deps/obs-ffmpeg-libs

          cat > deps/avcodec.def << 'FFDEF'
          LIBRARY avcodec-61
          EXPORTS
              avcodec_find_decoder
              avcodec_find_decoder_by_name
              avcodec_find_encoder
              avcodec_find_encoder_by_name
              avcodec_alloc_context3
              avcodec_free_context
              avcodec_open2
              avcodec_send_packet
              avcodec_receive_frame
              avcodec_send_frame
              avcodec_receive_packet
              avcodec_parameters_from_context
              av_packet_alloc
              av_packet_free
              av_packet_unref
          FFDEF

          cat > deps/avutil.def << 'FFDEF'
          LIBRARY avutil-59
          EXPORTS
              av_frame_alloc
              av_frame_free
              av_frame_get_buffer
              av_image_alloc
              av_freep
              av_free
              av_malloc
              av_mallocz
              av_strerror
              av_rescale_q
              av_channel_layout_default
              av_channel_layout_copy
              av_get_pix_fmt_string
              av_opt_set
          FFDEF

          cat > deps/swscale.def << 'FFDEF'
          LIBRARY swscale-8
          EXPORTS
              sws_getContext
              sws_freeContext
              sws_scale
          FFDEF

          cat > deps/swresample.def << 'FFDEF'
          LIBRARY swresample-5
          EXPORTS
              swr_alloc_set_opts2
              swr_init
              swr_free
              swr_convert
          FFDEF

          cat > deps/avformat.def << 'FFDEF'
          LIBRARY avformat-61
          EXPORTS
              avformat_open_input
              avformat_close_input
              avformat_new_stream
              avformat_write_header
              av_write_frame
              av_interleaved_write_frame
              av_write_trailer
              avformat_alloc_output_context2
              avio_open
              avio_closep
              avio_alloc_context
              avio_context_free
              avformat_free_context
              av_guess_format
              avformat_network_init
              avformat_network_deinit
              av_dump_format
          FFDEF

      - name: Generate import libraries from def files
        shell: cmd
        run: |
          lib /def:deps\obs.def /out:deps\obs.lib /machine:x64
          lib /def:deps\w32-pthreads.def /out:deps\w32-pthreads.lib /machine:x64
          lib /def:deps\dnssd.def /out:deps\dnssd.lib /machine:x64
          for %%f in (avcodec avutil swscale swresample avformat) do (
            lib /def:deps\%%f.def /out:deps\obs-ffmpeg-libs\%%f.lib /machine:x64
          )

      - name: Set OpenSSL path
        id: openssl
        shell: bash
        run: |
          OPENSSL_DIR="C:/Program Files/OpenSSL"
          if [ -d "C:/Program Files/OpenSSL-Win64" ]; then
            OPENSSL_DIR="C:/Program Files/OpenSSL-Win64"
          fi
          echo "dir=$OPENSSL_DIR" >> "$GITHUB_OUTPUT"
          echo "OpenSSL dir: $OPENSSL_DIR"
          # Debug: show lib directory contents
          find "$OPENSSL_DIR" -name "*.lib" 2>/dev/null | head -20 || echo "No .lib files found"

      - name: Apply UxPlay Windows patches and create build config
        shell: bash
        run: |
          UXLIB="deps/mika-obs-airplay/UxPlay/lib"

          # Patch compat.h - add winsock2, gettimeofday, remove snprintf macro
          sed -i 's/#include <ws2tcpip.h>/#include <winsock2.h>\n#include <ws2tcpip.h>/' "$UXLIB/compat.h"
          sed -i '/#ifndef snprintf/,/#endif/d' "$UXLIB/compat.h"
          # Add gettimeofday after windows.h include
          sed -i '/#include <windows.h>/a #include <pthread.h>\nstatic __inline int gettimeofday(struct timeval *tv, void *tz) { FILETIME ft; ULARGE_INTEGER ui; GetSystemTimeAsFileTime(\&ft); ui.LowPart=ft.dwLowDateTime; ui.HighPart=ft.dwHighDateTime; ui.QuadPart-=116444736000000000ULL; tv->tv_sec=(long)(ui.QuadPart/10000000ULL); tv->tv_usec=(long)((ui.QuadPart%10000000ULL)/10); (void)tz; return 0; }' "$UXLIB/compat.h"

          # Patch threads.h - use w32-pthreads
          cat > "$UXLIB/threads.h" << 'THEOF'
          #ifndef THREADS_H
          #define THREADS_H
          #if defined(WIN32)
          #include <windows.h>
          #include <pthread.h>
          #define sleepms(x) Sleep(x)
          #else
          #include <pthread.h>
          #include <unistd.h>
          #define sleepms(x) usleep((x)*1000)
          #endif
          typedef pthread_t thread_handle_t;
          #define THREAD_RETVAL void *
          #define THREAD_CREATE(handle, func, arg) pthread_create(&(handle), NULL, func, arg)
          #define THREAD_JOIN(handle) pthread_join(handle, NULL)
          typedef pthread_mutex_t mutex_handle_t;
          typedef pthread_cond_t cond_handle_t;
          #define MUTEX_CREATE(handle) pthread_mutex_init(&(handle), NULL)
          #define MUTEX_LOCK(handle) pthread_mutex_lock(&(handle))
          #define MUTEX_UNLOCK(handle) pthread_mutex_unlock(&(handle))
          #define MUTEX_DESTROY(handle) pthread_mutex_destroy(&(handle))
          #define COND_CREATE(handle) pthread_cond_init(&(handle), NULL)
          #define COND_SIGNAL(handle) pthread_cond_signal(&(handle))
          #define COND_DESTROY(handle) pthread_cond_destroy(&(handle))
          #endif
          THEOF

          # Patch byteutils.c - write a completely new header section
          cat > /tmp/byteutils_header.txt << 'BHEOF'
          #include <time.h>
          #if defined(WIN32) || defined(_WIN32)
          #include <winsock2.h>
          #include <stdlib.h>
          #ifndef htonll
          #define htonll(x) _byteswap_uint64(x)
          #endif
          #ifndef ntohll
          #define ntohll(x) _byteswap_uint64(x)
          #endif
          #else
          #include <netinet/in.h>
          #ifndef htonll
          #ifdef SYS_ENDIAN_H
          #include <sys/endian.h>
          #else
          #include <endian.h>
          #endif
          #define htonll(x) htobe64(x)
          #define ntohll(x) be64toh(x)
          #endif
          #endif
          #include "byteutils.h"
          BHEOF
          # Remove everything from start to "// The functions" line, then prepend new header
          sed -n '/\/\/ The functions/,$p' "$UXLIB/byteutils.c" > /tmp/byteutils_body.txt
          cat /tmp/byteutils_header.txt /tmp/byteutils_body.txt > "$UXLIB/byteutils.c"

          # Patch raop_rtp_mirror.c
          sed -i 's|#include <netinet/tcp.h>|#if defined(WIN32)\n#include <winsock2.h>\n#define SOL_TCP IPPROTO_TCP\n#else\n#include <netinet/tcp.h>\n#endif|' "$UXLIB/raop_rtp_mirror.c"

          # Patch raop_ntp.c - clock_gettime and ioctl
          sed -i 's|clock_gettime(CLOCK_REALTIME, \&time);|gettimeofday(\&time, NULL);|' "$UXLIB/raop_ntp.c"
          sed -i 's|struct timespec time;|struct timeval time;|' "$UXLIB/raop_ntp.c"
          sed -i 's|time.tv_nsec / 1000|time.tv_usec|' "$UXLIB/raop_ntp.c"
          sed -i 's|while (ioctl(fd, FIONREAD, \&bytes_available)|#if defined(WIN32)\n    while (ioctlsocket(fd, FIONREAD, (u_long *)\&bytes_available)|' "$UXLIB/raop_ntp.c"
          sed -i '/ioctlsocket.*FIONREAD/a #else\n    while (ioctl(fd, FIONREAD, \&bytes_available) == 0 \&\& bytes_available > 0)\n#endif' "$UXLIB/raop_ntp.c" || true

          # Patch dnssd.c - don't include system dns_sd.h
          sed -i 's|^#include <dns_sd.h>|#if !defined(WIN32)\n#include <dns_sd.h>\n#endif|' "$UXLIB/dnssd.c"

          # Patch httpd.c - add MUTEX_CREATE
          sed -i '/httpd->joined = 1;/a\    MUTEX_CREATE(httpd->run_mutex);' "$UXLIB/httpd.c"

          # Create uxplay-build CMakeLists.txt
          mkdir -p deps/uxplay-build
          cat > deps/uxplay-build/CMakeLists.txt << 'CMEOF'
          cmake_minimum_required(VERSION 3.16)
          project(uxplay-airplay C)
          set(UXPLAY_LIB "${CMAKE_CURRENT_SOURCE_DIR}/../mika-obs-airplay/UxPlay/lib")
          set(LIBPLIST_DIR "${CMAKE_CURRENT_SOURCE_DIR}/../libplist-2.7.0")
          if(NOT DEFINED OPENSSL_DIR)
              set(OPENSSL_DIR "C:/Program Files/OpenSSL")
          endif()
          set(W32_PTHREADS_DIR "${CMAKE_CURRENT_SOURCE_DIR}/../obs-sdk/obs-studio-32.1.2/deps/w32-pthreads")
          set(DNSSD_LIB "${CMAKE_CURRENT_SOURCE_DIR}/../dnssd.lib")
          aux_source_directory(${UXPLAY_LIB}/playfair playfair_src)
          add_library(playfair STATIC ${playfair_src})
          target_include_directories(playfair PUBLIC ${UXPLAY_LIB}/playfair)
          target_compile_definitions(playfair PRIVATE _CRT_SECURE_NO_WARNINGS WIN32_LEAN_AND_MEAN)
          if(MSVC)
              target_compile_options(playfair PRIVATE /wd4244 /wd4267 /wd4996)
          endif()
          aux_source_directory(${UXPLAY_LIB}/llhttp llhttp_src)
          add_library(llhttp STATIC ${llhttp_src})
          target_include_directories(llhttp PUBLIC ${UXPLAY_LIB}/llhttp)
          target_compile_definitions(llhttp PRIVATE _CRT_SECURE_NO_WARNINGS)
          if(MSVC)
              target_compile_options(llhttp PRIVATE /wd4244 /wd4267 /wd4996)
          endif()
          set(AIRPLAY_SOURCES
              ${UXPLAY_LIB}/byteutils.c ${UXPLAY_LIB}/crypto.c ${UXPLAY_LIB}/dnssd.c
              ${UXPLAY_LIB}/fairplay_playfair.c ${UXPLAY_LIB}/http_request.c
              ${UXPLAY_LIB}/http_response.c ${UXPLAY_LIB}/httpd.c ${UXPLAY_LIB}/logger.c
              ${UXPLAY_LIB}/mirror_buffer.c ${UXPLAY_LIB}/netutils.c ${UXPLAY_LIB}/pairing.c
              ${UXPLAY_LIB}/raop.c ${UXPLAY_LIB}/raop_buffer.c ${UXPLAY_LIB}/raop_ntp.c
              ${UXPLAY_LIB}/raop_rtp.c ${UXPLAY_LIB}/raop_rtp_mirror.c ${UXPLAY_LIB}/utils.c
          )
          add_library(airplay STATIC ${AIRPLAY_SOURCES})
          target_include_directories(airplay PUBLIC
              ${UXPLAY_LIB} ${UXPLAY_LIB}/playfair ${UXPLAY_LIB}/llhttp
              ${LIBPLIST_DIR}/include ${OPENSSL_DIR}/include ${W32_PTHREADS_DIR}
          )
          target_compile_definitions(airplay PUBLIC
              WIN32 _CRT_SECURE_NO_WARNINGS _CRT_NONSTDC_NO_DEPRECATE
              WIN32_LEAN_AND_MEAN LIBPLIST_STATIC OPENSSL_API_COMPAT=0x10101000L
          )
          if(MSVC)
              target_compile_options(airplay PRIVATE /wd4244 /wd4267 /wd4996 /wd4018 /wd4146 /wd4005 /wd4133)
          endif()
          find_library(OPENSSL_CRYPTO_LIB NAMES libcrypto crypto libcrypto-3-x64
              PATHS "${OPENSSL_DIR}/lib" "${OPENSSL_DIR}/lib/VC" "${OPENSSL_DIR}/lib/VC/x64" "${OPENSSL_DIR}/lib/VC/x64/MD" "${OPENSSL_DIR}/lib/VC/x64/MT"
              NO_DEFAULT_PATH)
          if(NOT OPENSSL_CRYPTO_LIB)
              find_library(OPENSSL_CRYPTO_LIB NAMES libcrypto crypto)
          endif()
          message(STATUS "OpenSSL crypto lib: ${OPENSSL_CRYPTO_LIB}")
          target_link_libraries(airplay PUBLIC playfair llhttp
              ${LIBPLIST_DIR}/build/plist.lib ${OPENSSL_CRYPTO_LIB}
              ${DNSSD_LIB} ${CMAKE_CURRENT_SOURCE_DIR}/../w32-pthreads.lib
              ws2_32 iphlpapi
          )
          CMEOF

      - name: Build UxPlay libraries
        shell: cmd
        run: |
          cd deps\uxplay-build
          if exist build rmdir /s /q build
          mkdir build
          cd build
          cmake .. -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl -DOPENSSL_DIR="${{ steps.openssl.outputs.dir }}"
          nmake

      - name: Build plugin
        shell: cmd
        run: |
          if exist build rmdir /s /q build
          mkdir build
          cd build
          cmake .. -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl -DOPENSSL_DIR="${{ steps.openssl.outputs.dir }}"
          nmake

      - name: Download w32-pthreads.dll from OBS Studio release
        shell: pwsh
        run: |
          $url = "https://github.com/obsproject/obs-studio/releases/download/32.1.2/OBS-Studio-32.1.2-Windows-x64.zip"
          $dest = "$env:TEMP\obs-release.zip"
          $extractDir = "$env:TEMP\obs-release"
          Invoke-WebRequest -Uri $url -OutFile $dest -MaximumRetryCount 3 -RetryIntervalSec 5
          Expand-Archive -Path $dest -DestinationPath $extractDir -Force
          $dll = Get-ChildItem -Path $extractDir -Recurse -Filter "w32-pthreads.dll" | Select-Object -First 1
          if (-not $dll) {
            Write-Error "w32-pthreads.dll not found in OBS release zip"
            exit 1
          }
          Write-Host "Found: $($dll.FullName)"
          New-Item -ItemType Directory -Force -Path w32-pthreads-dll | Out-Null
          Copy-Item $dll.FullName -Destination w32-pthreads-dll\w32-pthreads.dll
          Write-Host "Copied w32-pthreads.dll successfully"

      - name: Download FFmpeg shared DLLs (for standalone bundle)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-win64-gpl-shared-7.1.zip"
          $dest = "$env:TEMP\ffmpeg-shared.zip"
          $extractDir = "$env:TEMP\ffmpeg-shared"
          Invoke-WebRequest -Uri $url -OutFile $dest -MaximumRetryCount 3 -RetryIntervalSec 5
          Expand-Archive -Path $dest -DestinationPath $extractDir -Force
          $ffmpegDir = Get-ChildItem -Path $extractDir -Directory | Where-Object { $_.Name -like 'ffmpeg-n7.1*' } | Select-Object -First 1 -ExpandProperty FullName
          if (-not $ffmpegDir) {
            Write-Error "Could not find expected ffmpeg-n7.1* directory in $extractDir. Available: $(Get-ChildItem $extractDir | Select-Object -ExpandProperty Name)"
            exit 1
          }
          Write-Host "Found FFmpeg dir: $ffmpegDir"
          New-Item -ItemType Directory -Force -Path ffmpeg-dlls | Out-Null
          foreach ($dll in @('avcodec', 'avutil', 'avformat', 'swresample')) {
            $found = Get-ChildItem -Path "$ffmpegDir\bin" -Filter "${dll}-*.dll" -ErrorAction SilentlyContinue
            if ($found) { Copy-Item $found.FullName -Destination ffmpeg-dlls\ }
            else { Write-Warning "Warning: $dll DLL not found in $ffmpegDir\bin\" }
          }
          Get-ChildItem ffmpeg-dlls\

      - name: Download and build libdatachannel
        shell: cmd
        run: |
          REM Capture absolute paths before any directory changes
          set LIBDC_ROOT=%CD%
          set LIBDC_SRC=%CD%\deps\libdatachannel-src
          set LIBDC_INSTALL=%CD%\deps\libdatachannel
          git clone --depth 1 --recurse-submodules --branch v0.24.2 ^
            https://github.com/paullouisageneau/libdatachannel.git "%LIBDC_SRC%"
          if errorlevel 1 exit /b 1
          cmake -S "%LIBDC_SRC%" -B "%LIBDC_SRC%\build" -G "NMake Makefiles" ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DUSE_GNUTLS=0 ^
              "-DCMAKE_INSTALL_PREFIX=%LIBDC_INSTALL%"
          if errorlevel 1 exit /b 1
          cd /d "%LIBDC_SRC%\build"
          nmake
          if errorlevel 1 exit /b 1
          cmake --install "%LIBDC_SRC%\build"
          if errorlevel 1 exit /b 1
          REM Clean up source tree to save disk space
          cd /d "%LIBDC_ROOT%"
          rmdir /s /q "%LIBDC_SRC%"

      - name: Build standalone airplay-stream.exe
        shell: cmd
        run: |
          if exist build-standalone rmdir /s /q build-standalone
          mkdir build-standalone
          cd build-standalone
          cmake .. -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl ^
              -DBUILD_OBS_PLUGIN=OFF -DBUILD_STANDALONE=ON ^
              -DOPENSSL_DIR="${{ steps.openssl.outputs.dir }}"
          nmake

      - name: Prepare release artifact
        shell: bash
        run: |
          mkdir -p artifact
          cp build/obs-airplay-receiver.dll artifact/
          OPENSSL_DIR="${{ steps.openssl.outputs.dir }}"
          found_crypto=0
          for dll in "$OPENSSL_DIR/bin"/libcrypto-*-x64.dll "$OPENSSL_DIR"/libcrypto-*-x64.dll "$OPENSSL_DIR/bin"/libcrypto*.dll; do
            if [ -f "$dll" ]; then
              cp "$dll" artifact/
              echo "Copied OpenSSL DLL: $dll"
              found_crypto=1
              break
            fi
          done
          if [ $found_crypto -eq 0 ]; then
            echo "ERROR: No libcrypto DLL found in $OPENSSL_DIR"
            exit 1
          fi
          cp install.bat artifact/
          cp uninstall.bat artifact/
          cp README.md artifact/

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer exe
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: obs-airplay-receiver
          path: artifact/

      - name: Upload artifact (installer)
        uses: actions/upload-artifact@v4
        with:
          name: obs-airplay-receiver-installer
          path: OBS-AirPlay-Receiver-Setup-*.exe

      - name: Prepare standalone artifact
        shell: bash
        run: |
          mkdir -p artifact-standalone
          cp build-standalone/standalone/airplay-stream.exe artifact-standalone/
          # FFmpeg DLLs
          cp ffmpeg-dlls/*.dll artifact-standalone/ 2>/dev/null || true
          # w32-pthreads DLL
          cp w32-pthreads-dll/w32-pthreads.dll artifact-standalone/
          # OpenSSL DLL (handle any libcrypto-*-x64.dll version)
          OPENSSL_DIR="${{ steps.openssl.outputs.dir }}"
          found_crypto=0
          for dll in "$OPENSSL_DIR/bin"/libcrypto-*-x64.dll "$OPENSSL_DIR"/libcrypto-*-x64.dll "$OPENSSL_DIR/bin"/libcrypto*.dll; do
            if [ -f "$dll" ]; then
              cp "$dll" artifact-standalone/
              echo "Copied OpenSSL DLL: $dll"
              found_crypto=1
              break
            fi
          done
          if [ $found_crypto -eq 0 ]; then
            echo "ERROR: No libcrypto DLL found in $OPENSSL_DIR"
            exit 1
          fi
          # libdatachannel DLL
          cp deps/libdatachannel/bin/datachannel.dll artifact-standalone/
          cp README.md artifact-standalone/
          cat > artifact-standalone/README-STANDALONE.txt << 'EOF'
          airplay-stream.exe — Standalone AirPlay to MPEG-TS TCP streamer
          =================================================================

          INCLUDED FILES
          --------------
          airplay-stream.exe       — The standalone AirPlay receiver
          avcodec-61.dll           — FFmpeg (LGPL/GPL)
          avutil-59.dll            — FFmpeg
          avformat-61.dll          — FFmpeg
          swresample-5.dll         — FFmpeg
          libcrypto-3-x64.dll      — OpenSSL
          w32-pthreads.dll         — POSIX Threads for Windows (LGPL, from OBS Studio)
          datachannel.dll          — libdatachannel WebRTC (MPL 2.0)

          ADDITIONAL REQUIREMENTS (not bundled for licensing reasons)
          -----------------------------------------------------------
          1. dnssd.dll — Apple Bonjour / mDNS
             Install via:
               • iTunes for Windows (free from microsoft.com/en-us/p/itunes)
               • Bonjour Print Services for Windows:
                 https://support.apple.com/kb/DL999
             Once installed, dnssd.dll will be in your system PATH.

          USAGE
          -----
          airplay-stream.exe [--name "My Stream"] [--port 8888]
          airplay-stream.exe --hw-accel
          airplay-stream.exe --help

          Then open the stream in VLC:
            vlc tcp://localhost:8888
          EOF
          ls -la artifact-standalone/

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: airplay-stream-standalone
          path: artifact-standalone/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Determine release version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download OBS plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: obs-airplay-receiver
          path: obs-plugin/

      - name: Download OBS plugin installer
        uses: actions/download-artifact@v4
        with:
          name: obs-airplay-receiver-installer
          path: installer/

      - name: Download standalone artifact
        uses: actions/download-artifact@v4
        with:
          name: airplay-stream-standalone
          path: standalone/

      - name: Create release archives
        run: |
          cd obs-plugin
          zip -r ../obs-airplay-receiver-${{ steps.ver.outputs.tag }}.zip .
          cd ../standalone
          zip -r ../airplay-stream-standalone-${{ steps.ver.outputs.tag }}.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "OBS AirPlay Receiver ${{ steps.ver.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            obs-airplay-receiver-${{ steps.ver.outputs.tag }}.zip
            installer/OBS-AirPlay-Receiver-Setup-*.exe
            airplay-stream-standalone-${{ steps.ver.outputs.tag }}.zip
